<body class="bg-background text-on-background h-full flex flex-col md:flex-row antialiased font-sans overflow-hidden">
<!-- Sidebar Navigation (Suppressed for Task-focused form, but keeping TopAppBar for context if needed, though instructions say to suppress navigation shell for transactional/task-focused pages. I will suppress BOTH SideNav and BottomNav to prioritize the canvas as per "Automatic Suppression" rule for Task-Focused pages.) -->
<!-- Top App Bar (Simplified for transactional page - usually a close/cancel action here) -->
<header class="bg-surface h-control_height w-full sticky top-0 z-50 flex justify-between items-center px-gutter w-full max-w-full border-b border-outline-variant md:hidden">
<div class="flex items-center gap-sm">
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 rounded p-1">
<span class="material-symbols-outlined">close</span>
</button>
<span class="font-headline-md text-headline-md text-on-surface">Ticket Loom</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 h-full overflow-y-auto flex flex-col items-center p-sm md:p-xl bg-background">
<!-- Transactional Header -->
<div class="w-full max-w-4xl flex items-center justify-between mb-lg px-xs">
<div class="flex items-center gap-sm">
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 rounded p-1 hidden md:flex h-control_height items-center justify-center w-control_height border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Edit Ticket #4029</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-1 mt-1">
<span class="w-2 h-2 rounded-full bg-tertiary"></span>
<span class="hidden" id="unsaved-indicator">Unsaved changes</span>
<span class="" id="saved-indicator">All changes saved</span>
</p>
</div>
</div>
<div class="flex gap-sm">
<button class="h-control_height px-md border border-outline-variant rounded bg-surface text-on-surface font-label-md text-label-md hover:bg-surface-container-low transition-colors duration-200" type="button">
                    Cancel
                </button>
<button class="h-control_height px-md border border-transparent rounded bg-primary text-on-primary font-label-md text-label-md hover:bg-primary-container transition-colors duration-200 shadow-sm" type="button">
                    Save Changes
                </button>
</div>
</div>
<!-- Form Canvas -->
<div class="w-full max-w-4xl bg-surface-container-lowest border border-outline-variant rounded flex flex-col lg:flex-row shadow-sm">
<!-- Left Column: Primary Content -->
<div class="flex-1 p-lg border-b lg:border-b-0 lg:border-r border-outline-variant flex flex-col gap-lg">
<!-- Subject -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="subject">Subject <span class="text-error">*</span></label>
<input class="h-control_height w-full bg-surface border border-outline-variant rounded px-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="subject" name="subject" oninput="markDirty()" required="" type="text" value="Unable to access VPN from remote office"/>
<!-- Validation message placeholder -->
<span class="font-body-sm text-body-sm text-error hidden absolute -bottom-5 left-0">Subject is required.</span>
</div>
<!-- Description (Rich Text Facsimile) -->
<div class="flex flex-col gap-xs flex-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="description">Description</label>
<!-- Toolbar -->
<div class="flex items-center gap-xs border border-outline-variant border-b-0 rounded-t bg-surface-container-low p-1">
<button class="p-1 rounded hover:bg-surface-container-highest text-on-surface-variant transition-colors" title="Bold"><span class="material-symbols-outlined text-[16px]">format_bold</span></button>
<button class="p-1 rounded hover:bg-surface-container-highest text-on-surface-variant transition-colors" title="Italic"><span class="material-symbols-outlined text-[16px]">format_italic</span></button>
<button class="p-1 rounded hover:bg-surface-container-highest text-on-surface-variant transition-colors" title="Underline"><span class="material-symbols-outlined text-[16px]">format_underlined</span></button>
<div class="w-[1px] h-4 bg-outline-variant mx-1"></div>
<button class="p-1 rounded hover:bg-surface-container-highest text-on-surface-variant transition-colors" title="List"><span class="material-symbols-outlined text-[16px]">format_list_bulleted</span></button>
<button class="p-1 rounded hover:bg-surface-container-highest text-on-surface-variant transition-colors" title="Link"><span class="material-symbols-outlined text-[16px]">link</span></button>
<div class="flex-1"></div>
<button class="p-1 rounded hover:bg-surface-container-highest text-on-surface-variant transition-colors font-code text-code px-2" title="Code View">{" "}</button>
</div>
<textarea class="w-full flex-1 bg-surface border border-outline-variant rounded-b p-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors resize-y min-h-[200px]" id="description" name="description" oninput="markDirty()" rows="12">User reports getting error code 809 when attempting to connect to the primary VPN gateway from the London satellite office.
Troubleshooting steps taken:
- Verified credentials
- Checked local network connectivity (OK)
- Restarted Cisco AnyConnect service

Awaiting firewall logs from network team.</textarea>
</div>
</div>
<!-- Right Column: Metadata / Attributes -->
<div class="w-full lg:w-64 p-lg flex flex-col gap-lg bg-surface-container-lowest rounded-r">

<div class="flex flex-col gap-xs">

<select class="h-control_height w-full bg-surface border border-outline-variant rounded px-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none appearance-none cursor-pointer" id="queue" name="queue" onchange="markDirty()">

<option selected="" value="network">Network Engineering</option>
<option value="security">Security</option>

<option value="unassigned">Unassigned</option>
<option selected="" value="jdoe">Jane Doe</option>
<option value="asmith">Alex Smith</option>
<option value="rjones">Robert Jones</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">person</span>
</div>
</div>
</div>
<!-- Tags/Labels (Visual flair) -->
<div class="flex flex-col gap-xs mt-auto pt-lg border-t border-outline-variant">
<label class="font-label-sm text-label-sm text-on-surface-variant">Labels</label>
<div class="flex flex-wrap gap-xs">
<span class="px-2 py-1 bg-primary-container text-on-primary-container rounded font-label-sm text-label-sm flex items-center gap-1">
                            vpn <button class="hover:text-primary"><span class="material-symbols-outlined text-[12px]">close</span></button>
</span>
<span class="px-2 py-1 bg-surface-container-high text-on-surface rounded font-label-sm text-label-sm flex items-center gap-1">
                            london <button class="hover:text-on-surface-variant"><span class="material-symbols-outlined text-[12px]">close</span></button>
</span>
<button class="px-2 py-1 border border-dashed border-outline-variant text-on-surface-variant rounded font-label-sm text-label-sm hover:bg-surface-container-low transition-colors">
                            + Add
                        </button>
</div>
</div>
</div>
</div>
</main>
<script>
        // Simple JS for 'dirty' state tracking
        let isDirty = false;
        
        function markDirty() {
            if (!isDirty) {
                isDirty = true;
                document.getElementById('unsaved-indicator').classList.remove('hidden');
                document.getElementById('saved-indicator').classList.add('hidden');
                
                // Update indicator color
                const dot = document.querySelector('.bg-tertiary, .bg-primary');
                if(dot) {
                    dot.classList.remove('bg-primary');
                    dot.classList.add('bg-tertiary');
                }
            }
            
            // Simple validation simulation
            const subject = document.getElementById('subject');
            const errorMsg = subject.nextElementSibling;
            if(subject.value.trim() === '') {
                subject.classList.add('border-error', 'focus:border-error', 'focus:ring-error');
                subject.classList.remove('border-outline-variant', 'focus:border-primary', 'focus:ring-primary');
                errorMsg.classList.remove('hidden');
            } else {
                subject.classList.remove('border-error', 'focus:border-error', 'focus:ring-error');
                subject.classList.add('border-outline-variant', 'focus:border-primary', 'focus:ring-primary');
                errorMsg.classList.add('hidden');
            }
        }

        // Initialize state
        document.getElementById('unsaved-indicator').classList.add('hidden');
        const dot = document.querySelector('.bg-tertiary, .bg-primary');
        if(dot) {
            dot.classList.remove('bg-tertiary');
            dot.classList.add('bg-primary'); // Assuming it starts 'saved'
        }
    </script>
